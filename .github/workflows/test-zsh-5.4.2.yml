name: test-zsh-5.4.2

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build pinned Zsh 5.4.2 test image
        run: docker build -f Dockerfile.542 -t antidote-zsh542-ci .
      - name: Verify toolchain versions
        run: |
          docker run --rm antidote-zsh542-ci /usr/local/bin/zsh -lc 'git --version'
          docker run --rm antidote-zsh542-ci /usr/local/bin/zsh -lc 'zsh --version'
      - name: Run tests in container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            antidote-zsh542-ci \
            /usr/local/bin/zsh -lc 'cd /workspace && just test-all local'
